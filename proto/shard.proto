syntax = "proto3";
package txndb;

service ShardService {
    rpc Execute(ExecuteRequest) returns (ExecuteResponse);
    rpc Prepare(PrepareRequest) returns (PrepareResponse);
    rpc Commit(CommitRequest) returns (CommitResponse);
    rpc Abort(AbortRequest) returns (AbortResponse);
    rpc QueryTxnState(TxnStateRequest) returns (TxnStateResponse);
    rpc DistributedJoin(DistributedJoinRequest) returns (DistributedJoinResponse);
    // Test-only: simulate Raft network partition to a peer replica in this shard.
    rpc SetRaftPeerPartition(SetRaftPeerPartitionRequest) returns (SetRaftPeerPartitionResponse);
}

enum OpType {
    OP_BEGIN = 0;
    OP_READ = 1;
    OP_WRITE = 2;
    OP_DELETE = 3;
    OP_SCAN = 4;
}

message ScanRow {
    bytes pk = 1;
    bytes row_value = 2;
}

message ExecuteRequest {
    uint64 raft_txn_id = 1;
    OpType op = 2;
    uint32 table_id = 3;
    bytes key = 4;
    bytes value = 5;
    uint64 snapshot_ts = 6;
    // OP_SCAN: [range_start_pk, range_end_exclusive) when range_end_open is false.
    bytes range_start_pk = 7;
    bytes range_end_exclusive = 8;
    bool range_end_open = 9;
}

message ExecuteResponse {
    bool ok = 1;
    uint32 error_code = 2;
    string error_message = 3;
    bytes value = 4;
    repeated ScanRow scan_rows = 5;
}

message PrepareRequest {
    uint64 raft_txn_id = 1;
    uint64 commit_ts = 2;
}

message PrepareResponse {
    bool vote_commit = 1;
    string error_message = 2;
}

message CommitRequest {
    uint64 raft_txn_id = 1;
    uint64 commit_ts = 2;
}

message CommitResponse {
    bool ok = 1;
    string error_message = 2;
}

message AbortRequest {
    uint64 raft_txn_id = 1;
}

message AbortResponse {
    bool ok = 1;
}

enum TxnStateCode {
    TXN_UNKNOWN = 0;
    TXN_IN_FLIGHT = 1;
    TXN_PREPARED = 2;
    TXN_COMMITTED = 3;
    TXN_ABORTED = 4;
}

message TxnStateRequest {
    uint64 raft_txn_id = 1;
}

message TxnStateResponse {
    bool ok = 1;
    TxnStateCode state = 2;
}

message SetRaftPeerPartitionRequest {
    uint32 peer_replica_id = 1;
    bool partitioned = 2;
}

message SetRaftPeerPartitionResponse {
    bool ok = 1;
}

enum JoinPhysicalOp {
    JOIN_OP_BROADCAST = 0;
    JOIN_OP_SHUFFLE = 1;
}

message JoinRowPayload {
    bytes row_bytes = 1;
    string join_key = 2;
}

message JoinOutputColumn {
    string name = 1;
    string value = 2;
}

message JoinOutputRow {
    repeated JoinOutputColumn columns = 1;
}

message DistributedJoinRequest {
    uint64 raft_txn_id = 1;
    JoinPhysicalOp op = 2;
    uint32 build_table_id = 3;
    uint32 probe_table_id = 4;
    string build_join_col = 5;
    string probe_join_col = 6;
    repeated JoinRowPayload broadcast_build_rows = 7;
    repeated JoinRowPayload shuffle_build_rows = 8;
    repeated JoinRowPayload shuffle_probe_rows = 9;
    repeated string build_column_names = 10;
    repeated string probe_column_names = 11;
    string build_table_name = 12;
    string probe_table_name = 13;
}

message DistributedJoinResponse {
    bool ok = 1;
    uint32 error_code = 2;
    string error_message = 3;
    repeated JoinOutputRow rows = 4;
}
