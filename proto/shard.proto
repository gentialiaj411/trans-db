syntax = "proto3";
package txndb;

service ShardService {
    rpc Execute(ExecuteRequest) returns (ExecuteResponse);
    rpc Prepare(PrepareRequest) returns (PrepareResponse);
    rpc Commit(CommitRequest) returns (CommitResponse);
    rpc Abort(AbortRequest) returns (AbortResponse);
}

enum OpType {
    OP_BEGIN = 0;
    OP_READ = 1;
    OP_WRITE = 2;
    OP_DELETE = 3;
    OP_SCAN = 4;
}

message ScanRow {
    bytes pk = 1;
    bytes row_value = 2;
}

message ExecuteRequest {
    uint64 raft_txn_id = 1;
    OpType op = 2;
    uint32 table_id = 3;
    bytes key = 4;
    bytes value = 5;
    uint64 snapshot_ts = 6;
    // OP_SCAN: [range_start_pk, range_end_exclusive) when range_end_open is false.
    bytes range_start_pk = 7;
    bytes range_end_exclusive = 8;
    bool range_end_open = 9;
}

message ExecuteResponse {
    bool ok = 1;
    uint32 error_code = 2;
    string error_message = 3;
    bytes value = 4;
    repeated ScanRow scan_rows = 5;
}

message PrepareRequest {
    uint64 raft_txn_id = 1;
    uint64 commit_ts = 2;
}

message PrepareResponse {
    bool vote_commit = 1;
    string error_message = 2;
}

message CommitRequest {
    uint64 raft_txn_id = 1;
    uint64 commit_ts = 2;
}

message CommitResponse {
    bool ok = 1;
    string error_message = 2;
}

message AbortRequest {
    uint64 raft_txn_id = 1;
}

message AbortResponse {
    bool ok = 1;
}
